version: '3.9'
services:
  postgres:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: robotics_dashboard
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
  redis:
    image: redis:7
    restart: always
    ports:
      - "6379:6379"
  backend:
    build: ./backend
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app/backend
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"
  celery-worker:
    build: ./backend
    command: celery -A backend.scheduler.celery_app.celery_app worker --loglevel=info
    volumes:
      - ./backend:/app/backend
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
  celery-beat:
    build: ./backend
    command: celery -A backend.scheduler.celery_app.celery_app beat --loglevel=info
    volumes:
      - ./backend:/app/backend
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
  frontend:
    build: ./frontend
    command: npm run dev
    volumes:
      - ./frontend:/app/frontend
    env_file:
      - .env
    ports:
      - "3000:3000"
volumes:
  pgdata:
